name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code and restart containers
        run: |
          set -euo pipefail

          PROD_DIR="$HOME/Drop"
          BACKEND_DIR="$PROD_DIR/backend"

          if [[ ! -d "$PROD_DIR/.git" ]]; then
            echo "Cloning repository into $PROD_DIR"
            git clone https://github.com/ZXerniXZ/Drop.git "$PROD_DIR"
          fi

          cd "$PROD_DIR"
          git fetch origin main
          git reset --hard origin/main

          if [[ ! -f "$BACKEND_DIR/.env" ]]; then
            echo "ERROR: Missing $BACKEND_DIR/.env — create it on the Raspberry Pi first."
            exit 1
          fi

          mkdir -p "$BACKEND_DIR/storage" "$BACKEND_DIR/data"

          BACKEND_PORT=$(grep -E '^BACKEND_PORT=' "$BACKEND_DIR/.env" | cut -d= -f2- | tr -d '[:space:]' || true)
          BACKEND_PORT="${BACKEND_PORT:-8083}"

          cd "$BACKEND_DIR"
          docker compose down
          docker compose up -d --build --wait --wait-timeout 120

          docker compose ps

          echo "Waiting for /docs to respond..."
          for attempt in $(seq 1 30); do
            if curl -sf --max-time 5 "http://localhost:${BACKEND_PORT}/docs" >/dev/null; then
              echo "Backend is ready (attempt ${attempt})"
              break
            fi
            if [[ "${attempt}" -eq 30 ]]; then
              echo "ERROR: Backend did not become ready in time"
              docker compose logs --tail=50 backend
              exit 1
            fi
            sleep 2
          done

          echo "Deploy completed successfully"
