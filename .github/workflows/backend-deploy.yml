name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code and restart containers
        run: |
          set -euo pipefail

          PROD_DIR="$HOME/Drop"
          BACKEND_DIR="$PROD_DIR/backend"

          if [[ ! -d "$PROD_DIR/.git" ]]; then
            echo "Cloning repository into $PROD_DIR"
            git clone https://github.com/ZXerniXZ/Drop.git "$PROD_DIR"
          fi

          cd "$PROD_DIR"
          git fetch origin main
          git reset --hard origin/main

          if [[ ! -f "$BACKEND_DIR/.env" ]]; then
            echo "ERROR: Missing $BACKEND_DIR/.env — create it on the Raspberry Pi first."
            exit 1
          fi

          mkdir -p "$BACKEND_DIR/storage" "$BACKEND_DIR/data"

          BACKEND_PORT=$(grep -E '^BACKEND_PORT=' "$BACKEND_DIR/.env" | cut -d= -f2- | tr -d '[:space:]' || true)
          BACKEND_PORT="${BACKEND_PORT:-8083}"

          cd "$BACKEND_DIR"
          docker compose down
          docker compose up -d --build

          docker compose ps
          curl -sf --max-time 10 "http://localhost:${BACKEND_PORT}/docs" >/dev/null

          echo "Deploy completed successfully"
