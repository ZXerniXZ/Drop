services:
  backend:
    build: .
    restart: always
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/drop_backend.db}
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
