services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data

  # Tunnel Cloudflare opzionale — avvia con: docker compose --profile tunnel up -d
  # In Zero Trust imposta il servizio del tunnel su http://backend:8080
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - backend
    profiles:
      - tunnel
